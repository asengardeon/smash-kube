name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync package.json version with tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Extract version from tag (e.g., v1.0.1 -> 1.0.1)
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "Setting version to $VERSION"
          npm version $VERSION --no-git-tag-version

      - name: Build and Publish Electron app
        run: npm run build
        env:
          GH_TOKEN: ${{ secrets.ACTION_REPO }}

      - name: List build outputs
        shell: bash
        run: ls -R dist/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smash-kube-binaries-${{ matrix.os }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.zip
            dist/*.blockmap

  publish:
    runs-on: ubuntu-latest
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: List downloaded files
        run: ls -R .

      - name: Create or Update Release with Binary Links
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.ACTION_REPO }}
          files: |
            **/*.dmg
            **/*.exe
            **/*.AppImage
            **/*.zip
          generate_release_notes: true
          draft: false
          prerelease: false
          append_body: true
          body: |
            ---
            ### Smash Kube 🚀 - Download dos Binários

            Escolha o instalador para o seu sistema operacional:

            - **Windows**: [Smash-Kube-Setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/smash-kube-portable.exe)
            - **macOS**: [Smash-Kube.dmg](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/smash-kube.dmg)
            - **Linux**: [Smash-Kube.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/smash-kube.AppImage)

            ---
            *Nota: Os links acima estão agora disponíveis após a conclusão do build em todas as plataformas.*
